

version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: edziennik_postgres
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-edziennik}
      POSTGRES_USER: ${DB_USER:-edziennik_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edziennik_user} -d ${DB_NAME:-edziennik} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

